<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servers Inventory Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
}

.header{
    background:#111827;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.4);
}

.header h1{
    color:#38bdf8;
}

.breadcrumb{
    margin-top:10px;
    color:#94a3b8;
}

.container{
    padding:25px;
}

.hidden{
    display:none;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    border:none;
    border-radius:16px;
    padding:30px;
    color:white;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.falcon{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.irns{
    background:linear-gradient(135deg,#16a34a,#15803d);
}

.prod{
    background:linear-gradient(135deg,#22c55e,#15803d);
}

.dr{
    background:linear-gradient(135deg,#f59e0b,#d97706);
}

.component{
    background:#334155;
}

.component:hover{
    background:#475569;
}

.search-box{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    margin-top:15px;
    margin-bottom:15px;
}

.result-card{
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    border-left:4px solid #38bdf8;
}

.result-card b{
    color:#38bdf8;
}

.back-btn{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ef4444;
    color:white;
    cursor:pointer;
}

.copy-btn{
    padding:5px 10px;
    border:none;
    border-radius:5px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    color:black;
}

th{
    background:#2563eb;
    color:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

.stats{
    margin-bottom:15px;
    color:#38bdf8;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="header">

    <h1>Production Support Server Portal</h1>

    <div id="breadcrumb"
         class="breadcrumb">
         Home
    </div>

</div>

<div class="container">

<!-- HOME PAGE -->

<div id="home">

    <h2>Global Search</h2>

    <input
    type="text"
    id="globalSearch"
    class="search-box"
    placeholder="Search hostname or IP (47, .47, WEB, APP, 10.5...)"
    onkeyup="globalSearch()">

    <div id="globalResults"></div>

    <div class="grid">

        <button
        class="card falcon"
        onclick="selectApp('Falcon')">

        FALCON

        </button>

        <button
        class="card irns"
        onclick="selectApp('IRNS')">

        IRNS

        </button>

    </div>

</div>

<!-- ENV PAGE -->

<div id="envPage" class="hidden">

    <h2>Select Environment</h2>

    <div class="grid">

        <button
        class="card prod"
        onclick="selectEnv('Production')">

        Production

        </button>

        <button
        class="card dr"
        onclick="selectEnv('DR')">

        Disaster Recovery

        </button>

    </div>

    <button
    class="back-btn"
    onclick="goHome()">

    Back

    </button>

</div>

<!-- COMPONENT PAGE -->

<div id="componentPage"
     class="hidden">

    <h2>Select Component</h2>

    <div id="componentButtons"
         class="grid"></div>

    <button
    class="back-btn"
    onclick="showEnvironmentPage()">

    Back

    </button>

</div>

<!-- SERVER PAGE -->

<div id="serverPage"
     class="hidden">

    <input
    type="text"
    id="componentSearch"
    class="search-box"
    placeholder="Search within component..."
    onkeyup="searchComponent()">

    <div id="serverCount"
         class="stats"></div>

    <div id="serverTable"></div>

    <button
    class="back-btn"
    onclick="showComponentPage()">

    Back

    </button>

</div>

<script>

/*****************
 SERVER DATA
 Replace this with your actual servers
*****************/

const data = {

    Falcon : {

        Production : {

            Web : [
                {
                    hostname:"FAL-WEB-01",
                    ip:"10.5.226.47"
                },
                {
                    hostname:"FAL-WEB-02",
                    ip:"10.5.226.48"
                }
            ],

            App : [
                {
                    hostname:"FAL-APP-01",
                    ip:"10.5.220.10"
                }
            ],

            DB : [
                {
                    hostname:"FAL-DB-01",
                    ip:"10.5.221.10"
                }
            ],

            MQ : [
                {
                    hostname:"FAL-MQ-01",
                    ip:"10.5.222.10"
                }
            ],

            Batch : [
                {
                    hostname:"FAL-BATCH-01",
                    ip:"10.5.223.10"
                }
            ]

        },

        DR : {

            Web : [
                {
                    hostname:"FAL-DR-WEB-01",
                    ip:"10.9.226.47"
                }
            ],

            App : [
                {
                    hostname:"FAL-DR-APP-01",
                    ip:"10.9.220.10"
                }
            ],

            DB : [
                {
                    hostname:"FAL-DR-DB-01",
                    ip:"10.9.221.10"
                }
            ]

        }

    },

    IRNS : {

        Production : {

            Web : [
                {
                    hostname:"IRNS-WEB-01",
                    ip:"10.6.226.147"
                }
            ],

            App : [
                {
                    hostname:"IRNS-APP-01",
                    ip:"10.6.220.10"
                }
            ]

        },

        DR : {

            Web : [
                {
                    hostname:"IRNS-DR-WEB-01",
                    ip:"10.8.226.247"
                }
            ]

        }

    }

};

/*****************
 GLOBAL VARIABLES
*****************/

let selectedApp = "";
let selectedEnv = "";

/*****************
 HIDE ALL PAGES
*****************/

function hideAll(){

    document.getElementById("home")
    .classList.add("hidden");

    document.getElementById("envPage")
    .classList.add("hidden");

    document.getElementById("componentPage")
    .classList.add("hidden");

    document.getElementById("serverPage")
    .classList.add("hidden");
}

/*****************
 APP SELECTION
*****************/

function selectApp(app){

    selectedApp = app;

    document.getElementById("breadcrumb")
    .innerText = app;

    hideAll();

    document.getElementById("envPage")
    .classList.remove("hidden");
}

/*****************
 ENVIRONMENT SELECTION
*****************/

function selectEnv(env){

    selectedEnv = env;

    document.getElementById("breadcrumb")
    .innerText =
    selectedApp +
    " > " +
    selectedEnv;

    let html = "";

    const components =
    Object.keys(
        data[selectedApp][selectedEnv]
    );

    components.forEach(component=>{

        html += `

        <button
        class="card component"
        onclick="showServers('${component}')">

        ${component}

        </button>

        `;

    });

    document.getElementById(
        "componentButtons"
    ).innerHTML = html;

    hideAll();

    document.getElementById(
        "componentPage"
    ).classList.remove("hidden");
}

/*****************
 SHOW SERVERS
*****************/

function showServers(component){

    const servers =
    data[selectedApp][selectedEnv][component];

    document.getElementById(
        "breadcrumb"
    ).innerText =
    selectedApp +
    " > " +
    selectedEnv +
    " > " +
    component;

    document.getElementById(
        "serverCount"
    ).innerText =
    "Total Servers : " +
    servers.length;

    let html = `

    <table id="serverData">

        <tr>

            <th>Hostname</th>
            <th>IP Address</th>
            <th>Actions</th>

        </tr>

    `;

    servers.forEach(server=>{

        html += `

        <tr>

            <td>

                ${server.hostname}

                <button
                class="copy-btn"
                onclick="copyText('${server.hostname}')">

                Copy

                </button>

            </td>

            <td>

                ${server.ip}

                <button
                class="copy-btn"
                onclick="copyText('${server.ip}')">

                Copy

                </button>

            </td>

            <td>

                ${selectedEnv}

            </td>

        </tr>

        `;

    });

    html += "</table>";

    document.getElementById(
        "serverTable"
    ).innerHTML = html;

    hideAll();

    document.getElementById(
        "serverPage"
    ).classList.remove("hidden");
}

/*****************
 SEARCH INSIDE COMPONENT
*****************/

function searchComponent(){

    let filter =
    document.getElementById(
        "componentSearch"
    )
    .value
    .toLowerCase();

    let rows =
    document.querySelectorAll(
        "#serverData tr"
    );

    rows.forEach((row,index)=>{

        if(index===0){
            return;
        }

        let txt =
        row.innerText.toLowerCase();

        row.style.display =
        txt.includes(filter)
        ? ""
        : "none";

    });
}

/*****************
 GLOBAL SEARCH
 Works with:
 47
 .47
 226.47
 WEB
 FAL
*****************/

function globalSearch(){

    let value =
    document.getElementById(
        "globalSearch"
    )
    .value
    .toLowerCase()
    .trim();

    let html = "";

    if(value===""){

        document.getElementById(
            "globalResults"
        ).innerHTML = "";

        return;
    }

    for(let app in data){

        for(let env in data[app]){

            for(
                let component
                in data[app][env]
            ){

                data[app][env][component]
                .forEach(server=>{

                    if(

                        server.hostname
                        .toLowerCase()
                        .includes(value)

                        ||

                        server.ip
                        .toLowerCase()
                        .includes(value)

                    ){

                        html += `

                        <div class="result-card">

                            <b>

                            ${server.hostname}

                            </b>

                            <br><br>

                            IP :
                            ${server.ip}

                            <br><br>

                            ${app}
                            >
                            ${env}
                            >
                            ${component}

                            <br><br>

                            <button
                            class="copy-btn"
                            onclick="copyText('${server.hostname}')">

                            Copy Host

                            </button>

                            <button
                            class="copy-btn"
                            onclick="copyText('${server.ip}')">

                            Copy IP

                            </button>

                        </div>

                        `;

                    }

                });

            }

        }

    }

    if(html===""){

        html = `

        <div class="result-card">

        No matching server found

        </div>

        `;
    }

    document.getElementById(
        "globalResults"
    ).innerHTML = html;
}

/*****************
 COPY FUNCTION
*****************/

function copyText(text){

    navigator.clipboard
    .writeText(text);

    alert(
        "Copied : " + text
    );
}

/*****************
 NAVIGATION
*****************/

function goHome(){

    document.getElementById(
        "breadcrumb"
    ).innerText = "Home";

    hideAll();

    document.getElementById(
        "home"
    ).classList.remove("hidden");
}

function showEnvironmentPage(){

    hideAll();

    document.getElementById(
        "envPage"
    ).classList.remove("hidden");
}

function showComponentPage(){

    hideAll();

    document.getElementById(
        "componentPage"
    ).classList.remove("hidden");
}

</script>

</body>
</html>
